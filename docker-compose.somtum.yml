# Somtum dual-bancho: run ONLY the g0v0 app, sharing bancho.py's MySQL + Redis.
#
# - No bundled mysql/redis/performance-server. g0v0 reaches bancho's `mysql`
#   and `redis` over the existing `banchopy_default` podman network.
# - DB = `lazer` (separate database on the same MySQL server as bancho's
#   `freedomdive_db`), so g0v0's own tables never collide with bancho's.
# - CALCULATOR=rosu (native in-process pp), so the performance-server
#   container is not required just to boot / prove shared login.
# - Named volumes (not host bind mounts) for app dirs, to avoid podman
#   rootless userns permission errors on ./plugins, ./config, etc.
# - All secrets + DB/redis wiring live in .env.
#
# Usage:
#   podman compose -f docker-compose.somtum.yml up -d --build
services:
  g0v0:
    build:
      context: .
      dockerfile: Dockerfile
    image: g0v0-somtum:latest
    container_name: somtum-g0v0
    env_file:
      - .env
    # Podman's in-network resolver (aardvark, ~10.89.x.1) resolves sibling
    # containers (mysql/redis) but wasn't forwarding external lookups, so the
    # osu! API fetcher failed with "Name or service not known". Point the
    # upstream forwarder at Cloudflare so osu.ppy.sh etc. resolve; container-name
    # resolution still works via aardvark.
    dns:
      - 1.1.1.1
      - 1.0.0.1
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - g0v0-replays:/app/replays
      - g0v0-storage:/app/storage
      - g0v0-logs:/app/logs
      - g0v0-config:/app/config
      # bancho's stable replays (read-only) so the importer can bridge .osr files
      # into g0v0 storage → leaderboard replays are watchable. See app/service/stable_import.
      - ../bancho.py/.data/osr:/bancho-osr:ro
      # bancho's custom-map zips + backgrounds (read-only): lazer downloads/covers
      # for somtum (id>=1e8) maps that osu!'s CDN/mirrors don't have. See somtum_assets.
      - ../bancho.py/.data/osz:/bancho-osz:ro
      - ../bancho.py/.data/bg:/bancho-bg:ro
      # bancho's per-set audio previews (.data/audio/{set_id}.mp3|ogg): somtum
      # (id>=1e8) sets aren't on b.ppy.sh's preview CDN, so lazer's in-client song
      # preview is served from here. See somtum_assets /somtum/preview.
      - ../bancho.py/.data/audio:/bancho-audio:ro
      # cached .osu files — used to synthesize relax taps into converted RX replays.
      - ../bancho.py/.data/osu:/bancho-osu:ro
      # clan avatar/banner assets (the website's asset root) — bridged as g0v0
      # team flag/cover images. Holds avatar/, avatars/, banners/ + default.jpg.
      - /var/www/assets/clans:/bancho-clan-assets:ro
      # the website's user-banner asset root (banners/{id}.ext) — bridged into
      # each user's lazer profile `cover`. See somtum_assets /somtum/user/banner.
      - /var/www/assets/banners:/bancho-user-banners:ro
    restart: unless-stopped
    networks:
      - banchopy_default

  # osu-server-spectator: serves the SignalR hubs (metadata=presence/online,
  # spectator, multiplayer) that the g0v0 FastAPI app does NOT. Shares the same
  # MySQL (`lazer`) + Redis; calls back into g0v0 over interop. Reachable on the
  # host at 8060 so Caddy can route `/signalr/*` here (everything else -> g0v0:8000).
  spectator:
    # Patched upstream image: fixes the friend-presence query
    # (relationship.type 'Friend'->'FOLLOW' + u.priv=1 -> u.priv&1=1 for
    # bancho-bridged privilege bitmasks). Build: see spectator-patch/.
    #   podman build -t g0v0-spectator-somtum:relfix ./spectator-patch
    image: localhost/g0v0-spectator-somtum:relfix
    container_name: somtum-spectator
    env_file:
      - .env
    environment:
      - SERVER_PORT=80
      - REDIS_HOST=redis
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - SHARED_INTEROP_DOMAIN=http://somtum-g0v0:8000
      # The spectator reads SP_SENTRY_DSN (NOT SENTRY_DSN) and the Sentry SDK
      # requires a project-id path. This dummy DSN is format-valid but resolves
      # nowhere (send failures are swallowed) — no real Sentry account / telemetry.
      - SP_SENTRY_DSN=https://public@sentry.example.com/1
      # SHARED_INTEROP_SECRET + MYSQL_USER/PASSWORD/DATABASE come from .env
    dns:
      - 1.1.1.1
      - 1.0.0.1
    ports:
      - "0.0.0.0:8060:80"
    volumes:
      - ./rulesets:/data/rulesets
    depends_on:
      - g0v0
    restart: unless-stopped
    networks:
      - banchopy_default

networks:
  banchopy_default:
    external: true

volumes:
  g0v0-replays:
  g0v0-storage:
  g0v0-logs:
  g0v0-config:
